spring.application.name=liquibase-demo
# spring.liquibase.contexts=prd


## Default JPA and Liquibase configuration
liquibase.change-log=classpath:db/changelog/changelog-master.xml
liquibase.default-schema=public
spring.liquibase.enabled=true

spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
# spring.liquibase.config=classpath:liquibase.properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.generate-ddl=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO

debug=true